name: Crawl & Deploy Quotes

on:
  schedule:
    - cron: "0 2 */2 * *"   # Every 2 days at 02:00 UTC
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write   # commit updated quotes.json back to repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Crawl new quotes
        id: crawl
        run: node scripts/crawl-quotes.mjs

      - name: Commit updated quotes (if any)
        if: steps.crawl.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/quotes.json
          git commit -m "chore: add ${{ steps.crawl.outputs.added }} new quotes from ZenQuotes"
          git push origin main

      - name: Generate app icons
        run: |
          npm install --no-save sharp
          node scripts/generate-icons.mjs

      - name: Download author images
        run: node scripts/download-images.mjs

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
