name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Download author images
        run: |
          mkdir -p public/authors
          UA="Mozilla/5.0 (compatible; Googlebot/2.1)"
          dl() {
            local slug="$1" url="$2"
            curl -sL -A "$UA" --max-time 20 -o "public/authors/${slug}.jpg" "$url"
            if [ -s "public/authors/${slug}.jpg" ]; then
              echo "✓ $slug ($(du -k "public/authors/${slug}.jpg" | cut -f1)KB)"
            else
              rm -f "public/authors/${slug}.jpg"
              echo "✗ $slug"
            fi
          }

          # Using Wikipedia Commons thumbnail URLs (most reliable CDN format)
          BASE="https://upload.wikimedia.org/wikipedia/commons/thumb"
          dl "albert-einstein"     "$BASE/d/d3/Albert_Einstein_Head.jpg/300px-Albert_Einstein_Head.jpg"
          dl "steve-jobs"          "$BASE/b/b9/Steve_Jobs_Headshot_2010-CROP_%28cropped_2%29.jpg/300px-Steve_Jobs_Headshot_2010-CROP_%28cropped_2%29.jpg"
          dl "nelson-mandela"      "$BASE/0/02/Nelson_Mandela_1994.jpg/300px-Nelson_Mandela_1994.jpg"
          dl "ho-chi-minh"         "$BASE/e/ef/Ho_Chi_Minh_1946.jpg/300px-Ho_Chi_Minh_1946.jpg"
          dl "winston-churchill"   "$BASE/b/bc/Sir_Winston_Churchill_-_19086236948.jpg/300px-Sir_Winston_Churchill_-_19086236948.jpg"
          dl "marie-curie"         "$BASE/7/7e/Marie_Curie_c1920.jpg/300px-Marie_Curie_c1920.jpg"
          dl "martin-luther-king"  "$BASE/0/05/Martin_Luther_King%2C_Jr..jpg/300px-Martin_Luther_King%2C_Jr..jpg"
          dl "abraham-lincoln"     "$BASE/a/ab/Abraham_Lincoln_O-77_matte_collodion_print.jpg/300px-Abraham_Lincoln_O-77_matte_collodion_print.jpg"
          dl "mark-twain"          "$BASE/0/0c/Mark_Twain_by_AF_Bradley.jpg/300px-Mark_Twain_by_AF_Bradley.jpg"
          dl "thomas-edison"       "$BASE/9/9d/Thomas_Edison2.jpg/300px-Thomas_Edison2.jpg"
          dl "helen-keller"        "$BASE/a/a9/Anne_Sullivan_and_Helen_Keller.jpg/300px-Anne_Sullivan_and_Helen_Keller.jpg"
          dl "maya-angelou"        "$BASE/4/4b/MayaAngelou-2013.jpg/300px-MayaAngelou-2013.jpg"
          dl "oprah-winfrey"       "$BASE/b/bf/Oprah_in_2014.jpg/300px-Oprah_in_2014.jpg"
          dl "paulo-coelho"        "$BASE/1/10/Paulo_Coelho.jpg/300px-Paulo_Coelho.jpg"
          dl "anne-frank"          "$BASE/b/be/Anne_Frank_1940.jpg/300px-Anne_Frank_1940.jpg"
          dl "dalai-lama"          "$BASE/6/64/Dalailama1_20121014_4639.jpg/300px-Dalailama1_20121014_4639.jpg"
          dl "theodore-roosevelt"  "$BASE/1/19/President_Theodore_Roosevelt%2C_1904.jpg/300px-President_Theodore_Roosevelt%2C_1904.jpg"
          dl "confucius"           "$BASE/2/23/Confucius_Tang_Dynasty.jpg/300px-Confucius_Tang_Dynasty.jpg"
          dl "socrates"            "$BASE/b/bc/Socrates_Louvre.jpg/300px-Socrates_Louvre.jpg"
          dl "marcus-aurelius"     "$BASE/e/ec/MSR-ra-1-1-della_colonna_di_marco_aurelio.jpg/300px-MSR-ra-1-1-della_colonna_di_marco_aurelio.jpg"
          dl "rumi"                "$BASE/e/e6/Maulana-Rumi.jpg/300px-Maulana-Rumi.jpg"
          dl "nguyen-du"           "$BASE/5/5d/Nguyen_Du.jpg/300px-Nguyen_Du.jpg"
          dl "ralph-waldo-emerson" "$BASE/d/d5/Ralph_Waldo_Emerson_ca1857_retouched.jpg/300px-Ralph_Waldo_Emerson_ca1857_retouched.jpg"
          dl "oscar-wilde"         "$BASE/a/a2/Oscar_Wilde_portrait.jpg/300px-Oscar_Wilde_portrait.jpg"
          dl "pablo-picasso"       "$BASE/9/98/Pablo_picasso_1.jpg/300px-Pablo_picasso_1.jpg"
          dl "henry-david-thoreau" "$BASE/a/a2/Henry_David_Thoreau.jpg/300px-Henry_David_Thoreau.jpg"
          dl "vincent-van-gogh"    "$BASE/4/4c/Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project_%28454045%29.jpg/300px-Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project_%28454045%29.jpg"
          dl "khalil-gibran"       "$BASE/7/72/Kahlil_Gibran_1913.jpg/300px-Kahlil_Gibran_1913.jpg"
          dl "duc-phat"            "$BASE/1/10/Siddharth_Gautam_Buddha.jpg/300px-Siddharth_Gautam_Buddha.jpg"
          dl "lao-tu"              "$BASE/e/ee/Laozi_-_Project_Gutenberg_eText_15250.jpg/300px-Laozi_-_Project_Gutenberg_eText_15250.jpg"
          dl "aristotle"           "$BASE/a/ae/Aristotle_Altemps_Inv8575.jpg/300px-Aristotle_Altemps_Inv8575.jpg"
          dl "seneca"              "$BASE/3/3b/Lucius_Annaeus_Seneca_from_the_double_herm_in_the_Antikensammlung_Berlin.jpg/300px-Lucius_Annaeus_Seneca_from_the_double_herm_in_the_Antikensammlung_Berlin.jpg"
          dl "albert-camus"        "$BASE/0/08/Albert_Camus%2C_gagnant_de_prix_Nobel%2C_portrait_en_buste%2C_pos%C3%A9_au_bureau%2C_faisant_face_%C3%A0_gauche%2C_cigarette_de_tabagisme.jpg/300px-Albert_Camus%2C_gagnant_de_prix_Nobel%2C_portrait_en_buste%2C_pos%C3%A9_au_bureau%2C_faisant_face_%C3%A0_gauche%2C_cigarette_de_tabagisme.jpg"
          dl "plato"               "$BASE/8/88/Plato_Silanion_Musei_Capitolini_MC1377.jpg/300px-Plato_Silanion_Musei_Capitolini_MC1377.jpg"
          dl "tran-hung-dao"       "$BASE/a/a4/Tranhungdao2.jpg/300px-Tranhungdao2.jpg"
          dl "nguyen-cong-tru"     "$BASE/a/ae/Nguyen_Cong_Tru.jpg/300px-Nguyen_Cong_Tru.jpg"
          dl "richard-branson"     "$BASE/b/b8/Richard_Branson_-_20090601_%28cropped%29.jpg/300px-Richard_Branson_-_20090601_%28cropped%29.jpg"
          dl "epictetus"           "$BASE/c/c5/Epicteti_Enchiridion_Latinis_versibus_adumbratum_%28Oxford_1715%29_frontispiece.jpg/300px-Epicteti_Enchiridion_Latinis_versibus_adumbratum_%28Oxford_1715%29_frontispiece.jpg"

          echo ""
          echo "Downloaded $(ls public/authors/*.jpg 2>/dev/null | wc -l) images"

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
