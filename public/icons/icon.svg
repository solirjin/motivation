<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="60%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- 4-pointed star (✦) — thin elegant proportions -->
  <!-- outer r=160, inner r=42, centered at 256,256 -->
  <polygon
    points="256,96 288,224 416,256 288,288 256,416 224,288 96,256 224,224"
    fill="url(#star)"
    opacity="0.96"/>

  <!-- Small center diamond accent -->
  <polygon
    points="256,236 266,256 256,276 246,256"
    fill="white"
    opacity="0.5"/>

  <!-- Tiny sparkle top-right -->
  <polygon
    points="390,118 396,134 412,140 396,146 390,162 384,146 368,140 384,134"
    fill="white"
    opacity="0.45"/>

  <!-- Tiny sparkle bottom-left -->
  <circle cx="132" cy="376" r="6" fill="white" opacity="0.3"/>
  <circle cx="118" cy="394" r="3.5" fill="white" opacity="0.2"/>
</svg>
